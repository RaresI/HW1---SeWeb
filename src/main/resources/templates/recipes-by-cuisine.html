<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Recipes by Cuisine</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 2rem auto; max-width: 960px; color: #222; }
        h1 { margin-bottom: 0.25rem; }
        p.subtitle { color: #666; margin-top: 0; }
        nav { margin-bottom: 0.6rem; }
        a.nav { color: #2649a7; text-decoration: none; margin-right: 1rem; font-weight: 600; font-size: 0.9rem; }
        a.nav:hover { text-decoration: underline; }
        form { margin-top: 1rem; display: flex; gap: 0.7rem; align-items: center; flex-wrap: wrap; }
        select, button { border: 1px solid #cfd6e4; border-radius: 6px; padding: 0.45rem 0.65rem; font-size: 0.95rem; }
        button { background: #2649a7; color: white; border: none; font-weight: 600; cursor: pointer; }
        button:hover { background: #1d3a85; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #e5e5e5; }
        th { background: #fafafa; font-weight: 600; }
        .badge { display: inline-block; padding: 0.15rem 0.55rem; border-radius: 999px; font-size: 0.8rem; }
        .cuisine { background: #eef3ff; color: #2649a7; }
        .difficulty { background: #f2f2f2; color: #555; }
        .empty { color: #888; font-style: italic; padding: 1rem 0; }
    </style>
</head>
<body>
<nav>
    <a class="nav" th:href="@{/recipes}">Recipes</a>
    <a class="nav" th:href="@{/recipes/cuisine}">Cuisine Filter</a>
    <a class="nav" th:href="@{/users}">Users</a>
    <a class="nav" th:href="@{/recommendations}">Recommendations</a>
</nav>

<h1>Recipes by cuisine</h1>
<p class="subtitle">XPath filter: <code>/recipes/recipe[cuisine = $cuisine]</code>.</p>

<form method="get" th:action="@{/recipes/cuisine}">
    <label for="cuisine"><strong>Select cuisine:</strong></label>
    <select id="cuisine" name="cuisine" required>
        <option value="" th:selected="${selectedCuisine == null || selectedCuisine.isEmpty()}" disabled>Choose one</option>
        <option th:each="c : ${cuisines}" th:value="${c}" th:text="${c}" th:selected="${selectedCuisine == c}">Italian</option>
    </select>
    <button type="submit">Show recipes</button>
</form>

<p th:if="${selectedCuisine != null && !selectedCuisine.isEmpty() && #lists.isEmpty(recipesByCuisine)}" class="empty">
    No recipes found for cuisine <strong th:text="${selectedCuisine}">Italian</strong>.
</p>

<table th:if="${!#lists.isEmpty(recipesByCuisine)}">
    <thead>
    <tr>
        <th>#</th>
        <th>Title</th>
        <th>Cuisine</th>
        <th>Difficulty</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="recipe : ${recipesByCuisine}">
        <td th:text="${recipe.id}">r01</td>
        <td>
            <a th:href="@{'/recipes/' + ${recipe.id}}" th:text="${recipe.title}">Title</a>
        </td>
        <td><span class="badge cuisine" th:text="${recipe.cuisine}">Italian</span></td>
        <td><span class="badge difficulty" th:text="${recipe.difficulty}">Easy</span></td>
    </tr>
    </tbody>
</table>
</body>
</html>
