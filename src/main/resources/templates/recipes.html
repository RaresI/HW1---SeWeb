<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Recipes</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 2rem auto; max-width: 960px; color: #222; }
        h1 { margin-bottom: 0.25rem; }
        p.subtitle { color: #666; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #e5e5e5; }
        th { background: #fafafa; font-weight: 600; }
        tbody tr:hover { background: #f7f9fc; }
        .badge { display: inline-block; padding: 0.15rem 0.55rem; border-radius: 999px; font-size: 0.8rem; }
        .cuisine { background: #eef3ff; color: #2649a7; }
        .difficulty { background: #f2f2f2; color: #555; }
        .empty { color: #888; font-style: italic; padding: 1rem 0; }
        .header-row { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; }
        a.button { background: #2649a7; color: white; text-decoration: none; padding: 0.45rem 0.9rem; border-radius: 6px; font-weight: 600; font-size: 0.9rem; }
        a.button:hover { background: #1d3a85; }
        .flash { margin-top: 1rem; padding: 0.7rem 1rem; background: #e8f4ea; color: #1e5a2b; border-left: 4px solid #3a9851; border-radius: 4px; }
        a.nav { color: #2649a7; text-decoration: none; margin-right: 1rem; font-weight: 600; font-size: 0.9rem; }
        a.nav:hover { text-decoration: underline; }
        nav { margin-bottom: 0.5rem; }
        .legend { margin-top: 1rem; font-size: 0.9rem; color: #444; }
        .legend .chip { display: inline-block; padding: 0.2rem 0.55rem; border-radius: 999px; margin-right: 0.45rem; font-weight: 600; }
        .legend .chip.match { background: #fff7b2; color: #6b5f00; }
        .legend .chip.other { background: #d9f5d6; color: #1f5f1b; }
    .controls { margin-top: 1rem; padding: 0.85rem 1rem; border: 1px solid #dbe2f0; background: #f8faff; border-radius: 8px; }
    .controls form { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
    .controls select, .controls button { border: 1px solid #cfd6e4; border-radius: 6px; padding: 0.42rem 0.62rem; font-size: 0.92rem; }
    .controls button { background: #2649a7; color: white; border: none; font-weight: 600; cursor: pointer; }
    .controls button:hover { background: #1d3a85; }
    .controls .hint { margin-top: 0.45rem; color: #555; font-size: 0.86rem; }
        .xsl-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .xsl-table th, .xsl-table td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #e5e5e5; }
        .xsl-table th { background: #fafafa; font-weight: 600; }
        .xsl-table tbody tr.match-skill { background: #fff7b2; }
        .xsl-table tbody tr.other-skill { background: #d9f5d6; }
        .xsl-table tbody tr:hover { filter: brightness(0.98); }
    </style>
</head>
<body>
    <nav>
        <a class="nav" th:href="@{/recipes}">Recipes</a>
        <a class="nav" th:href="@{/users}">Users</a>
        <a class="nav" th:href="@{/recommendations}">Recommendations</a>
    </nav>
    <div class="header-row">
        <div>
            <h1>Recipes</h1>
            <p class="subtitle">Loaded in-memory from <code>data/recipes.xml</code> and rendered with XSL.</p>
        </div>
        <div style="display:flex; gap:0.6rem;">
            <a class="button" th:href="@{/recipes/cuisine}">Filter by cuisine</a>
            <a class="button" th:href="@{/recipes/new}">+ Add recipe</a>
        </div>
    </div>

    <div class="flash" th:if="${savedTitle}">
        Saved <strong th:text="${savedTitle}">title</strong>.
    </div>

    <div class="legend">
        <span class="chip match">yellow</span> matches selected user's skill level
        <span class="chip other">green</span> does not match selected user's skill level
        <span th:if="${selectedSkill != null and !selectedSkill.isEmpty()}">(<strong th:text="${selectedSkill}">Medium</strong>)</span>
    </div>

    <div class="controls" th:if="${usersForSelection != null and !#lists.isEmpty(usersForSelection)}">
        <form method="get" th:action="@{/recipes}">
            <label for="userId"><strong>Highlight by user:</strong></label>
            <select id="userId" name="userId" required>
                <option th:each="u : ${usersForSelection}"
                        th:value="${u.id}"
                        th:selected="${selectedUserId == u.id}"
                        th:text="${u.name + ' ' + u.surname + ' (' + u.skillLevel + ')'}">User</option>
            </select>
            <button type="submit">Apply</button>
        </form>
        <div class="hint" th:if="${selectedUser != null}">
            Active user: <strong th:text="${selectedUser.name + ' ' + selectedUser.surname}">Name</strong>
            (<span th:text="${selectedUser.id}">u01</span>)
        </div>
    </div>

    <div th:utext="${recipesTableHtml}"></div>
</body>
</html>
